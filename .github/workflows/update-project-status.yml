name: Update Project Status

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-project-status:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip status]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate project status
        run: python tools/generate_project_status.py

      - name: Commit updated status
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No changes to commit."
          else
            git add README.md docs/project-status.md
            git commit -m "Update project status [skip status]"
            git push
          fi
