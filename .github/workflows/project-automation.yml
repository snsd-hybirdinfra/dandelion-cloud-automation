name: Project Automation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: project-automation-main
  cancel-in-progress: false

jobs:
  project-automation:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip automation]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate project status
        run: python tools/generate_project_status.py

      - name: Validate repository
        run: python tools/validate_repository.py

      - name: Commit generated reports
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No generated report changes."
          else
            git add README.md docs/project-status.md docs/validation-summary.md
            git commit -m "Update generated project reports [skip automation]"

            git pull --rebase origin main
            git push origin main
          fi
